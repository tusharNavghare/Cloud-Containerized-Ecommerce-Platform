apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:latest
          ports:
            - containerPort: "<PORT_NUMBER>"
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: POSTGRES_HOST
            
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: POSTGRES_PORT
            
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: POSTGRES_DB
            
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: POSTGRES_USER    
            
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: POSTGRES_PASSWORD    