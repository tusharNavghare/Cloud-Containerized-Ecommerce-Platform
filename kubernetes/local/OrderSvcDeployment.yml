apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: "<PORT_NUMBER>"
          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: SPRING_APPLICATION_NAME_ORDER
            
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: REDIS_PORT
                  
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: RABBITMQ_HOST

            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: RABBITMQ_PORT
                  
            - name: PRODUCT_SVC_URL
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: PRODUCT_SVC_URL
                  
            - name: EUREKA_CLIENT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: shared-infra-config
                  key: EUREKA_CLIENT_ENABLED      
                
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: RABBITMQ_USERNAME
                  
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: RABBITMQ_PASSWORD      
            
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: DB_URL_ORDER   
            
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: DB_USERNAME
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: DB_PASSWORD
            
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secret
                  key: JWT_SECRET