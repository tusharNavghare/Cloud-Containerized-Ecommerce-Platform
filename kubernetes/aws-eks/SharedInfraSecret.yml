  MQ_PASSWORD: "<MQ_PASSWORD>"
  
  DB_URL_AUTH: "<DB_URL_AUTH>"
  
  DB_URL_PRODUCT: "<DB_URL_PRODUCT>"
  
  DB_URL_ORDER: "<DB_URL_ORDER>"
  
  DB_URL_INVENTORY: "<DB_URL_INVENTORY>"
  
  JWT_SECRET: "<JWT_SECRET>"
  
  